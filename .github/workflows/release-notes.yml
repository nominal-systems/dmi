name: Generate Release Notes

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "release-notes"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dmi (this repo)
        uses: actions/checkout@v4
        with:
          path: dmi

      - name: Checkout project repositories
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          repos=(
            dmi-api
            dmi-api-admin-ui
            dmi-engine
            dmi-engine-antech-integration
            dmi-engine-antech-v6-integration
            dmi-engine-wisdom-panel-integration
            dmi-engine-idexx-integration
            dmi-engine-zoetis-integration
          )
          for repo in "${repos[@]}"; do
            echo "Cloning $repo..."
            git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/nominal-systems/${repo}.git" "$repo"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate release notes
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "RELEASE_DATE=${DATE}" >> $GITHUB_ENV

          python3 dmi/scripts/release-notes/generate-html.py \
            --config dmi/scripts/release-notes/config.json \
            --workspace ${{ github.workspace }} \
            --output "dmi/docs/release-notes/${DATE}"

      - name: Generate index page
        run: |
          python3 dmi/scripts/release-notes/generate-index.py \
            --site-dir dmi/docs

      - name: Commit and push
        working-directory: dmi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "release-notes: generate ${RELEASE_DATE}" || echo "No changes to commit"
          git push
